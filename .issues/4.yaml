id: 4
title: 改行がない長い文字列を自動で2行に分割する
status: Done
description: |-
    現状、改行 (`\n`) を含まない入力はすべて 1 行で描画されるため、
    文字数が多くなるほど fitSize によって 1 文字あたりが小さくなる。
    Slack の絵文字メーカー (zosu 系) のように、3 文字以上で改行が
    含まれていない場合は文字数を半分で割って自動的に 2 行に分割し、
    1 文字あたりのサイズを大きくする。
    明示的に `\n` が指定されている場合はその指定を尊重する。
